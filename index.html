<!DOCTYPE html>
<html>
    <head>
        <title>ZTM randomizer</title>
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    </head>
    <body>
        <h1>ZTM randomizer</h1>
        <div>
            <button id="random-stop">Random stop</button>
            <button id="random-route">Random route</button>
        </div>
        <div id="input-section">
            <label>Number of stops:</label>
            <input type="number" id="num-stops" min="1" max="15" value="1" onchange="if(this.value < 1) this.value = 1; if(this.value > 15) this.value = 15;">
        </div>
        <p id="result"></p>
        <p id="result-description"></p>
        <script src="script.js"></script>
    </body>
</html>
